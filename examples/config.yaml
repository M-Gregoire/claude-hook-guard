# Example configuration for claude-hook-guard
# Copy to ~/.config/claude-hook-guard/config.yaml and customize

# families_dir: Path to directory containing tool family definitions
# If not specified, defaults to ~/.config/claude-hook-guard/families
# Default families will be created automatically on first run
# families_dir: $HOME/.config/claude-hook-guard/families

logging:
  enabled: true
  file: $HOME/.claude/claude-hook-guard.log

# expand_command_substitutions: When enabled, Bash commands containing $()
# substitutions are expanded and each sub-command is evaluated independently
# against the same rules. The whole command is auto-allowed only if the main
# command AND all sub-commands individually match an "allow" rule.
# If any part is denied, the whole command is denied.
# If any part has no matching rule or matches "ask", the user is prompted.
# Default: false
# expand_command_substitutions: true

rules:
  # Allow all operations in ~/org/projects
  - name: allow-org-projects
    description: Allow read and write in org projects directory
    priority: 150
    match:
      action_type:
        one_of: ["read", "write"]
      path:
        regex: "^(/Users/.+/org/projects/|~/org/projects/)"
    action: allow
    reason: Documentation directory

  # Allow read operations in ~/src
  - name: allow-read-src
    description: Allow read operations in source directories
    priority: 100
    match:
      action_type:
        equals: "read"
      path:
        regex: "^(/Users/.+/src/|~/src/)"
    action: allow
    reason: Safe read operation in source directory

  # Deny destructive operations
  - name: deny-destructive
    description: Prevent rm -rf and similar dangerous commands
    priority: 200
    match:
      action_type:
        equals: "write"
      parameters:
        command:
          regex: "rm\\s+(-[^\\s]*r[^\\s]*f|--recursive.*--force)"
    action: deny
    reason: Destructive command blocked for safety

  # Deny git push to main/master
  - name: deny-git-push-main
    description: Prevent pushing directly to main/master
    priority: 200
    match:
      tool_family:
        equals: "git"
      parameters:
        command:
          regex: "git push.*(origin )?(main|master)"
    action: deny
    reason: Direct push to main/master is not allowed

  # MCP Examples: Allow all read operations from atlassian MCP server
  - name: allow-atlassian-reads
    description: Allow read-only Jira/Confluence operations
    priority: 100
    match:
      mcp_server:
        equals: "atlassian"
      mcp_tool:
        regex: "^(get|search|list|fetch|read).*"
    action: allow
    reason: Safe read operation on Atlassian services

  # MCP Examples: Require approval for Atlassian write operations
  - name: ask-atlassian-writes
    description: Prompt for Jira/Confluence modifications
    priority: 100
    match:
      mcp_server:
        equals: "atlassian"
      mcp_tool:
        regex: "^(create|update|delete|edit|add).*"
    action: ask
    reason: Modification to Atlassian resources requires approval

  # MCP Examples: Blanket approve all operations from a trusted MCP server
  # - name: allow-trusted-mcp
  #   description: Auto-approve all operations from trusted MCP server
  #   priority: 90
  #   match:
  #     mcp_server:
  #       equals: "trusted-server"
  #   action: allow
  #   reason: Trusted MCP server

  # Skill Examples: Auto-approve document creation skills
  # Skills from https://github.com/anthropics/skills
  # Use fully qualified names (plugin:skill) to avoid ambiguity
  - name: allow-document-skills
    description: Auto-approve Anthropic document creation/editing skills
    priority: 100
    match:
      tool_name:
        equals: "Skill"
      parameters:
        skill:
          one_of: ["document-skills:pdf", "document-skills:docx", "document-skills:pptx", "document-skills:xlsx"]
    action: allow
    reason: Safe document creation skill from official Anthropic plugin

  # Skill Examples: Match by prefix for all skills from a trusted plugin
  # - name: allow-all-document-skills
  #   priority: 100
  #   match:
  #     tool_name:
  #       equals: "Skill"
  #     parameters:
  #       skill:
  #         prefix: "document-skills:"
  #   action: allow
  #   reason: All skills from trusted document-skills plugin

# Note: When no rules match, the hook passes through to Claude Code,
# allowing the normal permission prompt with "Approve for this session"
